<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="64"
   height="64"
   viewBox="0 0 64 64"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <!-- 料斗主体 (漏斗形) -->
  <path
     style="fill:#657b83;fill-opacity:1;stroke:none"
     d="M 8,8 H 56 L 40,36 H 24 Z" />
  <!-- 料斗顶部边缘 -->
  <rect
     style="fill:#586e75;fill-opacity:1;stroke:none"
     width="52"
     height="5"
     x="6"
     y="4"
     rx="2"
     ry="2" />
  <!-- 颗粒 -->
  <circle style="fill:#2aa198;fill-opacity:1" cx="20" cy="16" r="3" />
  <circle style="fill:#2aa198;fill-opacity:1" cx="32" cy="14" r="3" />
  <circle style="fill:#2aa198;fill-opacity:1" cx="44" cy="16" r="3" />
  <circle style="fill:#2aa198;fill-opacity:1" cx="26" cy="22" r="3" />
  <circle style="fill:#2aa198;fill-opacity:1" cx="38" cy="21" r="3" />
  <circle style="fill:#2aa198;fill-opacity:1" cx="32" cy="28" r="3" />
  <!-- 出料管 -->
  <rect
     style="fill:#839496;fill-opacity:1;stroke:none"
     width="12"
     height="20"
     x="26"
     y="36" />
  <!-- 出料管底部 -->
  <rect
     style="fill:#93a1a1;fill-opacity:1;stroke:none"
     width="16"
     height="4"
     x="24"
     y="56"
     rx="1"
     ry="1" />
  <!-- 下落的颗粒 -->
  <circle style="fill:#2aa198;fill-opacity:0.8" cx="32" cy="48" r="2.5" />
  <circle style="fill:#2aa198;fill-opacity:0.6" cx="32" cy="62" r="2" />
</svg>
